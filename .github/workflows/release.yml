name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label used in artifact names (no leading v). Ignored when running from a tag.'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            msbuildPlat: x64
          - arch: arm64
            msbuildPlat: ARM64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like 'refs/tags/v*') {
              $v = $env:GITHUB_REF_NAME -replace '^v',''
          } elseif ('${{ github.event.inputs.version }}') {
              $v = '${{ github.event.inputs.version }}'
          } else {
              $v = 'dev'
          }
          Write-Host "Resolved version: $v"
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      # Build verification: compile the whole project in Debug with analyzers
      # enabled (csproj sets AnalysisLevel=latest / EnforceCodeStyleInBuild), so
      # any warning fails the pipeline before we ever produce a release artifact.
      # Debug is used because Release enables trimming analysis (IL2xxx warnings
      # from Core COM interop) that are expected and non-fatal at publish time.
      - name: Build check (0 warnings required)
        shell: pwsh
        run: |
          dotnet build ContextMenuManager.csproj `
            -c Debug `
            -p:Platform=${{ matrix.msbuildPlat }}

      - name: Publish ContextMenuManager (${{ matrix.arch }})
        shell: pwsh
        run: |
          dotnet publish ContextMenuManager.csproj `
            -c Release `
            -p:Platform=${{ matrix.msbuildPlat }} `
            -p:PublishProfile=Properties/PublishProfiles/win-${{ matrix.arch }}.pubxml

      - name: Package zip
        id: pack
        shell: pwsh
        run: |
          $version = '${{ steps.ver.outputs.version }}'
          $arch = '${{ matrix.arch }}'
          $publishDir = "bin/Release/net10.0-windows10.0.26100.0/win-$arch/publish"
          if (-not (Test-Path $publishDir)) { throw "Publish directory not found: $publishDir" }

          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $zipName = "ContextMenuManager-$version-win-$arch.zip"
          $zipPath = Join-Path (Resolve-Path dist) $zipName

          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $zipPath -CompressionLevel Optimal

          $hash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLower()
          "$hash *$zipName" | Out-File -FilePath "$zipPath.sha256" -Encoding ascii

          $sizeMb = [math]::Round((Get-Item $zipPath).Length / 1MB, 2)
          Write-Host "Packed $zipName ($sizeMb MB)"
          Write-Host "SHA256: $hash"

          "zipName=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "publishDir=$((Resolve-Path $publishDir).Path)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Build installer (Inno Setup)
        id: installer
        shell: pwsh
        run: |
          $version = '${{ steps.ver.outputs.version }}'
          $arch    = '${{ matrix.arch }}'
          $publishDir = '${{ steps.pack.outputs.publishDir }}'
          $distDir = (Resolve-Path dist).Path

          # Locate ISCC.exe. windows-latest ships Inno Setup 6 preinstalled.
          $iscc = @(
              "$Env:ProgramFiles\Inno Setup 6\ISCC.exe",
              "${Env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $iscc) {
              Write-Host "Inno Setup not found, installing via Chocolatey..."
              choco install innosetup --no-progress -y
              if ($LASTEXITCODE -ne 0) { throw "Failed to install Inno Setup" }
              $iscc = @(
                  "$Env:ProgramFiles\Inno Setup 6\ISCC.exe",
                  "${Env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
              ) | Where-Object { Test-Path $_ } | Select-Object -First 1
              if (-not $iscc) { throw "ISCC.exe still not found after install" }
          }
          Write-Host "Using ISCC: $iscc"

          & $iscc `
              "/DMyAppVersion=$version" `
              "/DMyAppArch=$arch" `
              "/DSourceDir=$publishDir" `
              "/DOutputDir=$distDir" `
              installer/ContextMenuManager.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }

          $setupName = "ContextMenuManager-Setup-$version-win-$arch.exe"
          $setupPath = Join-Path $distDir $setupName
          if (-not (Test-Path $setupPath)) { throw "Installer not produced: $setupPath" }

          $hash = (Get-FileHash -LiteralPath $setupPath -Algorithm SHA256).Hash.ToLower()
          "$hash *$setupName" | Out-File -FilePath "$setupPath.sha256" -Encoding ascii

          $sizeMb = [math]::Round((Get-Item $setupPath).Length / 1MB, 2)
          Write-Host "Built $setupName ($sizeMb MB)"
          Write-Host "SHA256: $hash"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ContextMenuManager-win-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ContextMenuManager-win-*
          merge-multiple: true
          path: dist

      - name: List artifacts
        run: ls -la dist

      - name: Compose release body (English download guide + auto notes)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 1) Let GitHub auto-generate the "What's Changed" section from commits/PRs.
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            -f target_commitish="${{ github.sha }}" \
            --jq '.body' > auto_notes.md || echo "" > auto_notes.md

          # 2) Write the bilingual (EN + ZH) file guide header.
          cat > release_body.md <<'EOF'
          ## 📦 Which file should I download? / 该下载哪个文件？

          | File | What it is | 中文说明 | Who should use it |
          |------|-----------|---------|-------------------|
          | `ContextMenuManager-<ver>-win-x64.zip` | **Portable build** — unzip and run `ContextMenuManager.exe`. No installation, no admin rights required. | **便携版** — 解压后直接运行 `ContextMenuManager.exe`，无需安装、无需管理员权限。 | Most users on Intel/AMD PCs who just want to run it. |
          | `ContextMenuManager-Setup-<ver>-win-x64.exe` | **Installer** (Inno Setup) — installs to `Program Files`, adds Start Menu + desktop shortcuts and an uninstaller. | **安装版**（Inno Setup）— 安装到 `Program Files`，并创建开始菜单 / 桌面快捷方式与卸载项。 | Users who want a proper install with shortcuts. |
          | `ContextMenuManager-<ver>-win-arm64.zip` | Portable build for **ARM64** devices. | **便携版**（ARM64）— 适用于 ARM 架构设备。 | Only for ARM-based Windows PCs (e.g. Snapdragon X). |
          | `ContextMenuManager-Setup-<ver>-win-arm64.exe` | Installer for **ARM64** devices. | **安装版**（ARM64）— 适用于 ARM 架构设备。 | Only for ARM-based Windows PCs (e.g. Snapdragon X). |
          | `*.sha256` | SHA-256 checksum files — verify your download was not corrupted. | **SHA-256 校验文件** — 用于核对下载文件是否完整未被篡改。 | Anyone who wants to verify integrity. |

          > **Architecture:** pick **x64** unless you specifically have an ARM64 Windows device.
          > **架构：** 除非你使用的是 ARM64 设备（如骁龙本），否则请选择 **x64**。
          > **Portable vs Installer:** the portable zip is self-contained and leaves no traces; the installer registers the app system-wide and creates shortcuts.
          > **便携版 vs 安装版：** 便携版为单文件夹、不写注册表；安装版会在系统中注册应用并创建快捷方式。

          ## What's Changed
          EOF

          # 3) Append the auto-generated notes (if any).
          cat auto_notes.md >> release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ContextMenuManager ${{ github.ref_name }}
          body_path: release_body.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.zip
            dist/*.exe
            dist/*.sha256
